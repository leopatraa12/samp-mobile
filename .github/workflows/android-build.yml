name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true

      - name: Install NDK and CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.2.11394342" "cmake;3.22.1" "platforms;android-34"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all variants
        run: ./gradlew assemble --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.2.11394342

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-debug-apks
          path: app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: warn

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-release-apks
          path: app/build/outputs/apk/*/release/*.apk
          if-no-files-found: warn
